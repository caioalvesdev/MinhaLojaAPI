name: Build Project

on:
  push:
    branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build:
        runs-on: ubuntu-latest
        name: Build Project

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .Net Core
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Build
              run: | 
                dotnet restore 
                dotnet build --configuration Release