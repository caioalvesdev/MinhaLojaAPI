name: Build Project

on:
  push:
    branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build:
        runs-on: ubuntu-latest
        name: Build Project

        steps:
            - name: Checkout code
            - uses: actions/checkout@v6

            - name: Setup .Net Core
            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: | 
                    9.0.x
                    10.0.x

            - name: Build
            - run: | 
                dotnet restore --configuration Release
                dotnet build --configuration Release